# vps-publish/.github/workflows/release.yml
# Miroir en lecture seule : lint / test / build uniquement.
# Plus de semantic-release ici — le monorepo est la seule source de vérité
# (versions + GitHub Release). Pensez à supprimer .releaserc.json de ce dépôt.
name: CI (mirror — read-only)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '22.14.0'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Pas de cache: npm — ces miroirs n'ont pas de package-lock.json versionné.
      - run: npm install --no-audit --no-fund --legacy-peer-deps
      # Lint/test informatifs : la qualité est garantie en amont par le monorepo.
      # Ne pas bloquer le merge (le miroir ne peut pas être corrigé sans être écrasé au sync).
      - run: npm run lint
        continue-on-error: true
      - run: npm run test
        continue-on-error: true
      - run: npm run build
